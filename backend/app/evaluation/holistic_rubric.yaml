holistic_rubric:
  - dimension: history_completeness
    display_name: "病史采集完整性"
    description: |
      学生在整次问诊中覆盖 OLDCARTS、伴随症状、既往史、家族史等关键维度的程度。
    anchors:
      "1": "几乎只问了主诉，关键鉴别信息严重遗漏。"
      "2": "覆盖部分系统，但缺多个关键维度。"
      "3": "覆盖大多数维度，少数关键信息遗漏。"
      "4": "覆盖全面，仅个别非关键细节缺失。"
      "5": "系统全面，所有关键鉴别信息均已采集。"

  - dimension: communication
    display_name: "医患沟通技巧"
    description: |
      自我介绍、开放式与封闭式提问的合理切换、共情、总结确认、语言通俗度。
    anchors:
      "1": "无自我介绍，语言生硬，几乎只问封闭式问题，缺乏共情。"
      "2": "沟通基本但欠缺共情或总结。"
      "3": "沟通顺畅，偶有共情或总结。"
      "4": "结构清晰，多次共情/总结，语言通俗。"
      "5": "全程结构化、共情自然，主动总结确认。"

  - dimension: clinical_reasoning
    display_name: "临床推理过程"
    description: |
      问诊路径是否体现鉴别诊断思路、是否针对性追问、是否避免过早收敛。
    anchors:
      "1": "问诊散乱，未见鉴别思路。"
      "2": "有零散假设，但未系统排查。"
      "3": "能围绕主诉做基本鉴别。"
      "4": "明确多个鉴别方向并针对性追问。"
      "5": "鉴别诊断框架清晰，根据病人回答动态收敛。"

  - dimension: diagnostic_accuracy
    display_name: "诊断结论准确性"
    description: |
      最终给出的主诊断与重要鉴别是否合理、与对话证据是否匹配。
    anchors:
      "1": "未给出诊断或方向完全错误。"
      "2": "给出诊断但缺乏证据支持或方向偏差大。"
      "3": "诊断方向基本正确，但鉴别考虑不足。"
      "4": "主诊断正确，含 1-2 个合理鉴别。"
      "5": "主诊断正确，鉴别全面，证据链清晰。"
