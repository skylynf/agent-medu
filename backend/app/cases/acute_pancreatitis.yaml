case_id: "acute_pancreatitis"
disease: "急性胰腺炎"
difficulty: 3
pathophysiology: |
  各种病因（胆石症、大量饮酒等）导致胰酶在胰腺内被异常激活 → 胰腺自身消化
  → 胰腺水肿、出血、坏死 → 释放大量炎症介质 → 可引起SIRS甚至MODS。
  临床表现为持续性上腹剧痛，向腰背部放射呈"束带感"，弯腰抱膝位可缓解。

patient_profile:
  name: "李伟"
  age: 45
  gender: "男"
  occupation: "企业老板"
  personality: "急躁，疼痛时烦躁不安"
  appearance: "面色苍白、大汗、弯腰抱膝"

information_layers:
  voluntary:
    - "医生，快帮帮我，上腹疼得要命"
    - "疼得我直不起腰来"

  on_inquiry:
    - trigger: "疼痛位置|哪里疼|部位"
      response: "上面这里，肚脐上面，整个一片都疼"
      critical: true
      checklist_item: "Location 部位"
    - trigger: "恶心|呕吐|想吐"
      response: "吐了好几次了，但吐完还是疼，一点都不缓解"
      checklist_item: "恶心呕吐"
    - trigger: "发烧|体温|发热"
      response: "有点发热，大概38.2度"
      checklist_item: "发热"
    - trigger: "大便|排便"
      response: "今天没大便，肚子也有点胀"
      checklist_item: "排便异常"
    - trigger: "小便|排尿"
      response: "小便发黄，但能尿"
      checklist_item: "排尿异常"
    - trigger: "什么时候|多久|几点"
      response: "今天凌晨三四点钟突然疼醒的"
      checklist_item: "Duration 持续时间"
    - trigger: "吃了什么|喝酒|饮食|诱因|昨晚"
      response: "昨晚应酬喝了不少白酒，还吃了很多油腻的菜"
      critical: true
      checklist_item: "诱因"
    - trigger: "以前|过去|既往|类似"
      response: "去年体检说有胆囊结石，医生说不大不用管"
      checklist_item: "既往类似发作"
    - trigger: "手术"
      response: "没做过手术"
      checklist_item: "手术史"
    - trigger: "过敏"
      response: "不清楚，好像没有"
      checklist_item: "药物过敏史"
    - trigger: "慢性病|高血压|糖尿病|高血脂"
      response: "有高血脂，平时不怎么吃药"
      checklist_item: "慢性病史"
    - trigger: "家族|家里人|父母"
      response: "我爸有糖尿病，其他不清楚"
      checklist_item: "家族消化系统疾病"

  deep_inquiry:
    - trigger: "放射|腰|背|其他地方疼"
      response: "对，疼到后背去了，就像一条带子勒在腰上一样"
      critical: true
      checklist_item: "Radiation 放射"
    - trigger: "性质|怎么疼|钻|绞|胀|刀割"
      response: "就像刀割一样疼，一直不停，太难受了"
      checklist_item: "Character 性质"
    - trigger: "什么姿势|弯腰|缓解|减轻|怎么好一点"
      response: "弯着腰抱着膝盖稍微好一点点，躺平了更疼"
      critical: true
      checklist_item: "Aggravating/Alleviating 加重/缓解因素"
    - trigger: "规律|间隔|持续|阵发"
      response: "一直在疼，没有停过，越来越重"
      checklist_item: "Timing/Temporal 时间规律"
    - trigger: "程度|多疼|打分|评分"
      response: "10分得有9分，我从来没这么疼过"
      checklist_item: "Severity 严重程度"
    - trigger: "起病|突然|慢慢"
      response: "半夜突然就疼醒了，非常突然"
      checklist_item: "Onset 起病方式"

emotional_model:
  baseline: "烦躁不安、极度痛苦、恐惧"
  if_doctor_empathetic: "稍有安慰但疼痛持续，说话仍急促"
  if_doctor_cold: "更加烦躁，催促'快点给我止痛'"
  if_doctor_rushing: "焦虑加剧，信息混乱"

expected_diagnosis: "急性胰腺炎（胆源性可能，酒精诱发）"
key_differentials:
  - "消化性溃疡穿孔"
  - "急性胆囊炎"
  - "急性心肌梗死（下壁）"
