case_id: "acute_cholecystitis"
disease: "急性胆囊炎"
difficulty: 2
pathophysiology: |
  胆囊管被结石嵌顿 → 胆囊内胆汁淤积 → 胆囊壁缺血水肿 → 继发细菌感染
  → 急性炎症（单纯性→化脓性→坏疽性）→ 可穿孔引起腹膜炎。
  典型表现为右上腹阵发性绞痛（胆绞痛），可放射至右肩及背部，Murphy征阳性。

patient_profile:
  name: "刘芳"
  age: 48
  gender: "女"
  occupation: "公司财务"
  personality: "话多、详细、焦虑"
  appearance: "体态偏胖，面色潮红，按压右上腹时痛苦"

information_layers:
  voluntary:
    - "医生，我右边肚子疼得厉害，一阵一阵的"
    - "已经疼了一晚上了，实在受不了才来的"

  on_inquiry:
    - trigger: "疼痛位置|哪里疼|部位"
      response: "就是右边这里，肋骨下面，一疼起来就受不了"
      critical: true
      checklist_item: "Location 部位"
    - trigger: "恶心|呕吐|想吐"
      response: "恶心得很，吐了两三次，吐出来都是苦水"
      checklist_item: "恶心呕吐"
    - trigger: "发烧|体温|发热"
      response: "有发烧，量了38.5度"
      checklist_item: "发热"
    - trigger: "大便|排便"
      response: "大便正常，昨天排过"
      checklist_item: "排便异常"
    - trigger: "小便|排尿"
      response: "小便颜色有点深，像浓茶似的"
      checklist_item: "排尿异常"
    - trigger: "什么时候|多久|几点"
      response: "昨天晚饭后大概九点多开始疼的"
      checklist_item: "Duration 持续时间"
    - trigger: "吃了什么|饮食|诱因"
      response: "昨天晚上吃了红烧肉和炸鸡，比较油腻"
      critical: true
      checklist_item: "诱因"
    - trigger: "以前|既往|类似|胆|胃"
      response: "以前也疼过几次，都是吃了油腻的东西以后疼，但没这次厉害。体检查出有胆囊结石，医生说不大"
      critical: true
      checklist_item: "既往类似发作"
    - trigger: "手术"
      response: "生孩子的时候剖腹产，其他没做过"
      checklist_item: "手术史"
    - trigger: "过敏"
      response: "对青霉素过敏，打过一次过敏了"
      checklist_item: "药物过敏史"
    - trigger: "慢性病|高血压|糖尿病"
      response: "有点高血压，吃着药控制的，血糖有点偏高但没到糖尿病"
      checklist_item: "慢性病史"
    - trigger: "家族|家里人"
      response: "我妈也有胆结石，做过胆囊切除"
      checklist_item: "家族消化系统疾病"

  deep_inquiry:
    - trigger: "性质|怎么疼|绞|胀|一阵一阵"
      response: "一阵一阵绞着疼，疼起来就像有东西在拧，过一会又轻一点"
      checklist_item: "Character 性质"
    - trigger: "放射|其他地方|肩膀|背"
      response: "右边肩膀和后背也疼，疼的时候一起连着疼"
      critical: true
      checklist_item: "Radiation 放射"
    - trigger: "加重|缓解|油腻|深呼吸"
      response: "吃油腻的就容易发作，深吸气的时候右边更疼"
      checklist_item: "Aggravating/Alleviating 加重/缓解因素"
    - trigger: "程度|打分|严重"
      response: "大概8分吧，特别疼的时候有9分"
      checklist_item: "Severity 严重程度"
    - trigger: "起病|突然|慢慢"
      response: "吃完饭过了一两个小时慢慢开始疼的，然后越来越重"
      checklist_item: "Onset 起病方式"
    - trigger: "规律|间隔"
      response: "疼一阵缓一阵，但今天基本一直在疼"
      checklist_item: "Timing/Temporal 时间规律"
    - trigger: "黄疸|眼睛黄|皮肤黄"
      response: "我老公说我眼白好像有点发黄"
      checklist_item: "排尿异常"

emotional_model:
  baseline: "焦虑、话多、反复描述疼痛"
  if_doctor_empathetic: "安心配合，详细描述"
  if_doctor_cold: "焦虑加剧，反复追问'我是不是很严重'"
  if_doctor_rushing: "慌张，说话更快更乱"

expected_diagnosis: "急性胆囊炎（结石性）"
key_differentials:
  - "胆管结石"
  - "急性胰腺炎"
  - "肝脓肿"
