case_id: "acute_appendicitis"
disease: "急性阑尾炎"
difficulty: 2
pathophysiology: |
  阑尾管腔阻塞（粪石、淋巴组织增生等）→ 管腔内压升高 → 阑尾壁血液循环障碍
  → 细菌侵入阑尾壁 → 炎症反应（单纯性→化脓性→坏疽性→穿孔）
  → 可出现局限性或弥漫性腹膜炎。
  典型表现为转移性右下腹痛（脐周→McBurney点），是阑尾炎最重要的特征。

patient_profile:
  name: "张明"
  age: 28
  gender: "男"
  occupation: "程序员"
  personality: "内向，不善表达，问什么答什么"
  appearance: "面色略苍白，弯腰捂腹"

information_layers:
  voluntary:
    - "医生，我肚子疼得厉害，受不了了"
    - "从昨天晚上开始的"

  on_inquiry:
    - trigger: "疼痛位置|哪里疼|部位|哪个地方"
      response: "一开始是肚脐周围疼，后来慢慢转到右下边了"
      critical: true
      checklist_item: "Location 部位"
    - trigger: "恶心|呕吐|想吐|吃东西"
      response: "有点恶心，昨晚吐了一次"
      checklist_item: "恶心呕吐"
    - trigger: "发烧|体温|发热|烧不烧"
      response: "好像有点发烧，早上量了37.8度"
      checklist_item: "发热"
    - trigger: "大便|排便|腹泻|拉肚子|便秘"
      response: "昨天到现在没大便"
      checklist_item: "排便异常"
    - trigger: "小便|排尿|尿"
      response: "小便正常，没什么问题"
      checklist_item: "排尿异常"
    - trigger: "什么时候开始|多久了|多长时间"
      response: "昨天晚上吃完饭大概八九点钟开始疼的"
      checklist_item: "Duration 持续时间"
    - trigger: "吃了什么|饮食|昨天吃"
      response: "昨天晚上和朋友吃了烧烤，喝了点啤酒"
      checklist_item: "诱因"
    - trigger: "以前|之前|过去|既往|得过"
      response: "以前没这样疼过，身体一直挺好的"
      checklist_item: "既往类似发作"
    - trigger: "手术|开过刀"
      response: "从来没做过手术"
      checklist_item: "手术史"
    - trigger: "过敏|药物过敏"
      response: "没有过敏的药"
      checklist_item: "药物过敏史"
    - trigger: "慢性病|高血压|糖尿病|长期"
      response: "没有，什么慢性病都没有"
      checklist_item: "慢性病史"
    - trigger: "家里人|家族|父母|遗传"
      response: "我爸有胃病，其他人都健康"
      checklist_item: "家族消化系统疾病"

  deep_inquiry:
    - trigger: "怎么疼|性质|一阵一阵|持续|绞痛|胀痛|刺痛"
      response: "最开始是一阵一阵隐隐的疼，后来变成一直疼，而且越来越厉害"
      checklist_item: "Character 性质"
    - trigger: "咳嗽|颠簸|走路|活动|动的时候|加重"
      response: "对对对，走路的时候右边特别疼，不敢动，咳嗽一下也疼得厉害"
      critical: true
      checklist_item: "Aggravating/Alleviating 加重/缓解因素"
    - trigger: "放射|其他地方也疼|传到|牵扯"
      response: "就是右下边那一块，没有疼到别的地方"
      checklist_item: "Radiation 放射"
    - trigger: "规律|间隔|什么时候更疼|时间"
      response: "没什么规律，就是一直疼，晚上更严重一些"
      checklist_item: "Timing/Temporal 时间规律"
    - trigger: "多疼|疼痛程度|打分|严重|厉害|评分"
      response: "如果满分10分的话，大概有7分吧，挺疼的"
      checklist_item: "Severity 严重程度"
    - trigger: "起病|突然|慢慢|怎么开始"
      response: "不是突然特别疼那种，是慢慢开始疼的，越来越重"
      checklist_item: "Onset 起病方式"

emotional_model:
  baseline: "焦虑、害怕、疼痛使表情痛苦"
  if_doctor_empathetic: "逐渐放松，愿意配合详细回答"
  if_doctor_cold: "紧张加剧，回答变简短，不愿多说"
  if_doctor_rushing: "感到被忽视，可能遗漏深层症状信息"

expected_diagnosis: "急性阑尾炎（化脓性可能）"
key_differentials:
  - "急性胃肠炎"
  - "右侧输尿管结石"
  - "梅克尔憩室炎"
