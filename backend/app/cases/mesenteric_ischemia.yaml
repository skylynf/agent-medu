case_id: "mesenteric_ischemia"
disease: "肠系膜动脉栓塞"
difficulty: 4
pathophysiology: |
  心源性血栓（房颤、瓣膜病等）或动脉粥样硬化斑块脱落 → 栓塞肠系膜上动脉
  → 肠壁急性缺血 → 肠黏膜屏障破坏 → 肠壁全层坏死 → 细菌移位、腹膜炎、感染性休克。
  核心特征："症状与体征不符"——早期剧烈腹痛但腹部体征轻微（腹软、无明显压痛），
  是诊断的关键线索，容易误诊。

patient_profile:
  name: "陈淑华"
  age: 72
  gender: "女"
  occupation: "退休教师"
  personality: "知识分子，描述准确但担忧"
  appearance: "年迈、面色苍白、大汗、痛苦面容"

information_layers:
  voluntary:
    - "医生，我肚子突然疼得厉害，从来没这么疼过"
    - "但我摸着肚子好像也不是硬的，就是里面疼"

  on_inquiry:
    - trigger: "疼痛位置|哪里疼|部位"
      response: "整个肚子都疼，肚脐周围最明显"
      checklist_item: "Location 部位"
    - trigger: "恶心|呕吐"
      response: "恶心，吐了一次，还拉了一次血便"
      critical: true
      checklist_item: "恶心呕吐"
    - trigger: "发烧|体温"
      response: "到医院量了37.3度，不算高烧"
      checklist_item: "发热"
    - trigger: "大便|排便|血便"
      response: "刚才拉了一次，里面带暗红色的血"
      critical: true
      checklist_item: "排便异常"
    - trigger: "小便|排尿"
      response: "小便还行"
      checklist_item: "排尿异常"
    - trigger: "什么时候|多久"
      response: "今天上午十点多突然就疼起来了，到现在四五个小时了"
      checklist_item: "Duration 持续时间"
    - trigger: "吃了什么|饮食|诱因"
      response: "早上正常吃的早餐，稀饭和馒头"
      checklist_item: "诱因"
    - trigger: "以前|既往|心脏|房颤"
      response: "我有房颤，十几年了，一直吃着药，还有高血压和冠心病"
      critical: true
      checklist_item: "慢性病史"
    - trigger: "手术"
      response: "五年前做过心脏支架"
      checklist_item: "手术史"
    - trigger: "过敏"
      response: "对磺胺类药物过敏"
      checklist_item: "药物过敏史"
    - trigger: "家族|家里人"
      response: "我老伴心脏病去世的，孩子们都健康"
      checklist_item: "家族消化系统疾病"
    - trigger: "吃什么药|用药|抗凝"
      response: "华法林、美托洛尔、降压药，但华法林最近自己停了几天，觉得太麻烦"
      critical: true
      checklist_item: "慢性病史"

  deep_inquiry:
    - trigger: "性质|怎么疼|绞|持续"
      response: "持续剧烈地疼，像绞着疼，非常难受"
      checklist_item: "Character 性质"
    - trigger: "起病|突然|慢慢"
      response: "非常突然，一下子就疼起来了"
      critical: true
      checklist_item: "Onset 起病方式"
    - trigger: "加重|缓解|体位"
      response: "怎么躺都不舒服，没有什么能缓解的"
      checklist_item: "Aggravating/Alleviating 加重/缓解因素"
    - trigger: "放射|传到"
      response: "没有特别传到别的地方"
      checklist_item: "Radiation 放射"
    - trigger: "程度|打分|严重"
      response: "非常非常疼，10分"
      checklist_item: "Severity 严重程度"
    - trigger: "肚子软|压痛|硬不硬|按"
      response: "对，很奇怪，这么疼但你按我肚子的时候好像也不是特别硬"
      critical: true
      checklist_item: "Aggravating/Alleviating 加重/缓解因素"

emotional_model:
  baseline: "恐惧、疼痛剧烈、描述清晰但紧张"
  if_doctor_empathetic: "信任配合，主动补充信息"
  if_doctor_cold: "更加害怕，担心被忽视"
  if_doctor_rushing: "焦虑但仍能配合"

expected_diagnosis: "急性肠系膜上动脉栓塞"
key_differentials:
  - "急性胰腺炎"
  - "消化性溃疡穿孔"
  - "绞窄性肠梗阻"
